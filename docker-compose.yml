version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: road-scanner-db
    environment:
      POSTGRES_USER: roadscanner
      POSTGRES_PASSWORD: roadscanner123
      POSTGRES_DB: roadscanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadscanner -d roadscanner"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: